<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitoya — 手作甜點</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --brown: #4A3525;
    --brown-light: #7A6050;
    --brown-pale: #C4A882;
    --cream: #FDFBF7;
    --cream-dark: #F5F0E8;
    --cream-border: #E8DFD0;
    --text: #2C1F12;
    --text-muted: #9A8878;
    --red: #C0392B;
    --green: #5D8A6A;
    --font-jp: 'Shippori Mincho', serif;
    --font-body: 'Noto Sans TC', sans-serif;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    --shadow: 0 2px 20px rgba(74,53,37,0.08);
    --shadow-hover: 0 8px 40px rgba(74,53,37,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--cream);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── PAGES ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(253,251,247,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--cream-border);
    padding: 0 5vw;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-family: var(--font-jp);
    font-size: 1.5rem;
    color: var(--brown);
    letter-spacing: 0.12em;
    cursor: pointer;
    text-decoration: none;
  }
  .logo span { font-size: 0.7rem; display: block; letter-spacing: 0.3em; color: var(--text-muted); font-family: var(--font-body); font-weight: 300; }
  nav { display: flex; gap: 2rem; align-items: center; }
  nav a {
    font-size: 0.82rem; letter-spacing: 0.15em; color: var(--text-muted);
    text-decoration: none; transition: color var(--transition); cursor: pointer;
  }
  nav a:hover { color: var(--brown); }
  .cart-btn {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--brown); color: var(--cream);
    border: none; padding: 0.5rem 1.2rem; cursor: pointer;
    font-family: var(--font-body); font-size: 0.82rem;
    letter-spacing: 0.1em; transition: background var(--transition);
    position: relative;
  }
  .cart-btn:hover { background: var(--brown-light); }
  .cart-count {
    background: var(--brown-pale); color: var(--cream);
    border-radius: 50%; width: 18px; height: 18px;
    font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
    font-weight: 500;
  }

  /* ── HERO ── */
  .hero {
    padding: 8rem 5vw 6rem;
    max-width: 900px;
  }
  .hero-label {
    font-size: 0.72rem; letter-spacing: 0.4em; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 1.5rem;
  }
  .hero h1 {
    font-family: var(--font-jp);
    font-size: clamp(2.2rem, 5vw, 4rem);
    color: var(--brown); line-height: 1.3;
    margin-bottom: 1.5rem; font-weight: 500;
  }
  .hero p { color: var(--text-muted); font-weight: 300; max-width: 480px; font-size: 0.95rem; }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 1.5rem;
    padding: 0 5vw; margin-bottom: 3rem;
  }
  .divider span { font-size: 0.72rem; letter-spacing: 0.4em; color: var(--text-muted); white-space: nowrap; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--cream-border); }

  /* ── PRODUCTS GRID ── */
  .products-section { padding: 0 5vw 8rem; }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 2rem;
  }
  .product-card {
    background: #fff;
    border: 1px solid var(--cream-border);
    cursor: pointer;
    transition: box-shadow var(--transition), transform var(--transition);
    overflow: hidden;
  }
  .product-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
  .product-img-wrap {
    width: 100%; aspect-ratio: 1/1; overflow: hidden;
    background: var(--cream-dark);
    position: relative;
  }
  .product-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s ease;
    display: block;
  }
  .product-card:hover .product-img-wrap img { transform: scale(1.04); }
  .product-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--cream-border); font-size: 2.5rem;
  }
  .product-info { padding: 1.2rem 1.4rem 1.4rem; }
  .product-name { font-family: var(--font-jp); font-size: 1.05rem; color: var(--brown); margin-bottom: 0.3rem; }
  .product-desc { font-size: 0.8rem; color: var(--text-muted); font-weight: 300; margin-bottom: 0.8rem; line-height: 1.5; min-height: 2.4em; }
  .product-price { font-size: 0.9rem; color: var(--brown-light); letter-spacing: 0.05em; }
  .product-price em { font-style: normal; font-size: 1.15rem; font-weight: 500; color: var(--brown); }

  /* ── LOADING / EMPTY ── */
  .loading-wrap { padding: 6rem 5vw; text-align: center; color: var(--text-muted); }
  .loading-dots span { animation: blink 1.2s infinite; display: inline-block; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(44,31,18,0.4); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity var(--transition);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  @media(min-width:640px) {
    .modal-overlay { align-items: center; }
  }
  .modal {
    background: var(--cream); width: 100%; max-width: 560px;
    max-height: 92vh; overflow-y: auto;
    transform: translateY(40px); transition: transform var(--transition);
    border-top: 3px solid var(--brown);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  @media(min-width:640px) {
    .modal { border-top: none; border-left: 3px solid var(--brown); max-height: 85vh; }
  }
  .modal-header {
    padding: 1.8rem 2rem 1.2rem;
    border-bottom: 1px solid var(--cream-border);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-title { font-family: var(--font-jp); font-size: 1.3rem; color: var(--brown); }
  .modal-price { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.2rem; }
  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 1.3rem; padding: 0.2rem;
    transition: color var(--transition);
  }
  .modal-close:hover { color: var(--brown); }
  .modal-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .modal-img-placeholder { width:100%; aspect-ratio:16/9; background:var(--cream-dark); display:flex; align-items:center; justify-content:center; color:var(--cream-border); font-size:3rem; }
  .modal-body { padding: 1.5rem 2rem 2rem; }

  /* ── OPTION GROUP ── */
  .option-group { margin-bottom: 1.4rem; }
  .option-label {
    font-size: 0.75rem; letter-spacing: 0.2em; color: var(--text-muted);
    margin-bottom: 0.6rem; display: block;
  }
  .option-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .option-chip {
    border: 1px solid var(--cream-border); background: #fff;
    padding: 0.4rem 1rem; font-size: 0.82rem; cursor: pointer;
    transition: all var(--transition); color: var(--text);
    font-family: var(--font-body);
  }
  .option-chip:hover { border-color: var(--brown-pale); }
  .option-chip.selected { border-color: var(--brown); background: var(--brown); color: var(--cream); }
  .option-chip .chip-price { font-size: 0.72rem; opacity: 0.8; margin-left: 0.3rem; }

  /* qty */
  .qty-wrap { display: flex; align-items: center; gap: 1rem; }
  .qty-btn {
    width: 32px; height: 32px; border: 1px solid var(--cream-border);
    background: #fff; cursor: pointer; font-size: 1.1rem; color: var(--brown);
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  .qty-btn:hover { border-color: var(--brown); }
  .qty-num { font-size: 1rem; min-width: 24px; text-align: center; }

  /* add-on */
  .addon-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 0; border-bottom: 1px solid var(--cream-border);
    cursor: pointer;
  }
  .addon-item:last-child { border-bottom: none; }
  .addon-check { width: 18px; height: 18px; border: 1px solid var(--cream-border); display:flex; align-items:center; justify-content:center; transition: all var(--transition); flex-shrink:0; }
  .addon-item.selected .addon-check { background: var(--brown); border-color: var(--brown); color: var(--cream); }
  .addon-name { font-size: 0.88rem; margin-left: 0.7rem; flex:1; }
  .addon-price { font-size: 0.82rem; color: var(--text-muted); }

  .modal-footer {
    padding: 1.2rem 2rem;
    border-top: 1px solid var(--cream-border);
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }
  .modal-total { font-size: 0.85rem; color: var(--text-muted); }
  .modal-total strong { font-size: 1.2rem; color: var(--brown); display: block; }
  .btn-primary {
    background: var(--brown); color: var(--cream);
    border: none; padding: 0.8rem 2rem; cursor: pointer;
    font-family: var(--font-body); font-size: 0.85rem; letter-spacing: 0.1em;
    transition: background var(--transition); white-space: nowrap;
  }
  .btn-primary:hover { background: var(--brown-light); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline {
    background: transparent; color: var(--brown);
    border: 1px solid var(--brown); padding: 0.7rem 1.5rem; cursor: pointer;
    font-family: var(--font-body); font-size: 0.85rem; letter-spacing: 0.1em;
    transition: all var(--transition);
  }
  .btn-outline:hover { background: var(--brown); color: var(--cream); }

  /* ── CART PAGE ── */
  .cart-page { padding: 3rem 5vw 6rem; max-width: 720px; margin: 0 auto; }
  .page-title { font-family: var(--font-jp); font-size: 1.6rem; color: var(--brown); margin-bottom: 0.5rem; }
  .page-subtitle { font-size: 0.82rem; color: var(--text-muted); letter-spacing: 0.15em; margin-bottom: 2.5rem; }
  .cart-item {
    display: flex; gap: 1rem; padding: 1.2rem 0;
    border-bottom: 1px solid var(--cream-border);
    align-items: flex-start;
  }
  .cart-item-img { width: 72px; height: 72px; object-fit: cover; flex-shrink:0; background: var(--cream-dark); }
  .cart-item-info { flex:1; }
  .cart-item-name { font-family: var(--font-jp); font-size: 0.95rem; color: var(--brown); margin-bottom: 0.2rem; }
  .cart-item-opts { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
  .cart-item-price { font-size: 0.9rem; color: var(--brown); font-weight: 500; white-space: nowrap; }
  .cart-item-remove { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; padding:0.2rem; transition: color var(--transition); }
  .cart-item-remove:hover { color: var(--red); }
  .cart-summary {
    margin-top: 2rem; padding: 1.5rem;
    background: var(--cream-dark); border: 1px solid var(--cream-border);
  }
  .summary-row { display:flex; justify-content:space-between; font-size:0.88rem; margin-bottom:0.6rem; }
  .summary-row.total { font-size:1.05rem; font-weight:500; color:var(--brown); border-top:1px solid var(--cream-border); padding-top:0.8rem; margin-top:0.8rem; }

  /* ── CHECKOUT FORM ── */
  .checkout-form { margin-top: 2.5rem; }
  .form-section-title { font-size: 0.72rem; letter-spacing: 0.3em; color: var(--text-muted); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--cream-border); }
  .form-group { margin-bottom: 1.2rem; }
  .form-label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 0.4rem; letter-spacing: 0.05em; }
  .form-input {
    width: 100%; border: 1px solid var(--cream-border); background: #fff;
    padding: 0.7rem 1rem; font-family: var(--font-body); font-size: 0.9rem;
    color: var(--text); outline: none; transition: border-color var(--transition);
  }
  .form-input:focus { border-color: var(--brown); }
  .form-input::placeholder { color: var(--text-muted); }
  textarea.form-input { resize: vertical; min-height: 80px; }
  .radio-group { display: flex; gap: 1rem; flex-wrap: wrap; }
  .radio-option {
    flex:1; min-width: 140px; border: 1px solid var(--cream-border);
    padding: 1rem; cursor: pointer; transition: all var(--transition); background: #fff;
  }
  .radio-option.selected { border-color: var(--brown); background: rgba(74,53,37,0.04); }
  .radio-option input { display: none; }
  .radio-title { font-size: 0.88rem; color: var(--brown); margin-bottom: 0.2rem; }
  .radio-desc { font-size: 0.75rem; color: var(--text-muted); }

  .bank-info {
    background: var(--cream-dark); border: 1px solid var(--cream-border);
    border-left: 3px solid var(--brown); padding: 1.2rem 1.4rem; margin-top: 1rem;
  }
  .bank-info p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.3rem; }
  .bank-info strong { font-size: 1.05rem; color: var(--brown); font-family: var(--font-jp); }
  .bank-note { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.8rem; line-height: 1.6; }

  /* ── SUCCESS PAGE ── */
  .success-page { padding: 8rem 5vw; text-align: center; }
  .success-icon { font-size: 3rem; margin-bottom: 1.5rem; }
  .success-page h2 { font-family: var(--font-jp); font-size: 1.8rem; color: var(--brown); margin-bottom: 1rem; }
  .success-page p { color: var(--text-muted); font-size: 0.9rem; max-width: 400px; margin: 0 auto 2rem; }

  /* ── ADMIN ── */
  .admin-login {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--brown);
  }
  .admin-login-box {
    background: var(--cream); padding: 3rem; width: 360px; text-align: center;
  }
  .admin-login-box h2 { font-family: var(--font-jp); color: var(--brown); margin-bottom: 0.3rem; font-size: 1.4rem; }
  .admin-login-box p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2rem; }
  .admin-login-error { color: var(--red); font-size: 0.8rem; margin-top: 0.8rem; }

  .admin-wrap { min-height: 100vh; background: #F7F4F0; }
  .admin-header {
    background: var(--brown); color: var(--cream);
    padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
  }
  .admin-header h1 { font-family: var(--font-jp); font-size: 1.2rem; letter-spacing: 0.1em; }
  .admin-header button { background: rgba(255,255,255,0.15); border: none; color: var(--cream); padding: 0.4rem 1rem; cursor: pointer; font-family: var(--font-body); font-size: 0.8rem; transition: background var(--transition); }
  .admin-header button:hover { background: rgba(255,255,255,0.25); }
  .admin-tabs {
    display: flex; border-bottom: 2px solid var(--cream-border);
    background: #fff; padding: 0 2rem;
  }
  .admin-tab {
    padding: 1rem 1.5rem; font-size: 0.85rem; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    color: var(--text-muted); transition: all var(--transition); letter-spacing: 0.05em;
  }
  .admin-tab.active { color: var(--brown); border-bottom-color: var(--brown); }
  .admin-content { padding: 2rem; }

  .admin-toolbar {
    display: flex; gap: 1rem; margin-bottom: 1.5rem;
    flex-wrap: wrap; align-items: center; justify-content: space-between;
  }
  .admin-toolbar h2 { font-family: var(--font-jp); font-size: 1.1rem; color: var(--brown); }
  .btn-sm {
    padding: 0.5rem 1.2rem; font-size: 0.8rem; letter-spacing: 0.08em;
    border: none; cursor: pointer; font-family: var(--font-body); transition: all var(--transition);
  }
  .btn-sm.primary { background: var(--brown); color: var(--cream); }
  .btn-sm.primary:hover { background: var(--brown-light); }
  .btn-sm.outline { background: transparent; border: 1px solid var(--brown); color: var(--brown); }
  .btn-sm.outline:hover { background: var(--brown); color: var(--cream); }
  .btn-sm.green { background: var(--green); color: #fff; }
  .btn-sm.red { background: var(--red); color: #fff; }

  .table-wrap { overflow-x: auto; background: #fff; border: 1px solid var(--cream-border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    background: var(--cream-dark); padding: 0.8rem 1rem; text-align: left;
    font-weight: 500; color: var(--text-muted); letter-spacing: 0.08em;
    font-size: 0.75rem; border-bottom: 1px solid var(--cream-border); white-space: nowrap;
  }
  td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--cream-border); color: var(--text); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--cream); }

  .badge {
    display: inline-block; padding: 0.2rem 0.7rem; font-size: 0.72rem; border-radius: 2px;
    letter-spacing: 0.05em;
  }
  .badge.pending { background: #FFF3CD; color: #856404; }
  .badge.done { background: #D1E7DD; color: #0A6640; }
  .badge.active { background: #D1E7DD; color: #0A6640; }
  .badge.inactive { background: #F8D7DA; color: #842029; }

  /* Product admin card */
  .product-admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
  .product-admin-card { background: #fff; border: 1px solid var(--cream-border); overflow: hidden; }
  .product-admin-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: var(--cream-dark); }
  .product-admin-body { padding: 1rem 1.2rem; }
  .product-admin-name { font-family: var(--font-jp); color: var(--brown); margin-bottom: 0.3rem; }
  .product-admin-price { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.8rem; }
  .product-admin-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* Product edit modal */
  .edit-modal-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(44,31,18,0.5); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; padding: 1rem;
    opacity: 0; pointer-events: none; transition: opacity var(--transition);
  }
  .edit-modal-overlay.open { opacity: 1; pointer-events: all; }
  .edit-modal {
    background: var(--cream); width: 100%; max-width: 600px;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(20px); transition: transform var(--transition);
  }
  .edit-modal-overlay.open .edit-modal { transform: translateY(0); }
  .edit-modal-header { padding: 1.5rem 1.8rem; border-bottom: 1px solid var(--cream-border); display: flex; justify-content: space-between; align-items: center; }
  .edit-modal-header h3 { font-family: var(--font-jp); color: var(--brown); }
  .edit-modal-body { padding: 1.5rem 1.8rem; }
  .edit-modal-footer { padding: 1rem 1.8rem; border-top: 1px solid var(--cream-border); display: flex; justify-content: flex-end; gap: 0.8rem; }

  .options-editor { border: 1px solid var(--cream-border); background: #fff; }
  .options-editor-header { padding: 0.7rem 1rem; background: var(--cream-dark); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-muted); }
  .option-row { display: flex; gap: 0.5rem; padding: 0.5rem 0.8rem; border-top: 1px solid var(--cream-border); align-items: center; }
  .option-row input { flex: 1; border: 1px solid var(--cream-border); padding: 0.35rem 0.6rem; font-family: var(--font-body); font-size: 0.82rem; outline: none; }
  .option-row input:focus { border-color: var(--brown); }
  .option-row-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
  .option-row-del:hover { color: var(--red); }

  .img-upload-area {
    border: 2px dashed var(--cream-border); padding: 2rem; text-align: center;
    cursor: pointer; transition: border-color var(--transition); background: #fff;
    position: relative;
  }
  .img-upload-area:hover { border-color: var(--brown-pale); }
  .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .img-upload-area p { font-size: 0.82rem; color: var(--text-muted); }
  .img-preview { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
    background: var(--brown); color: var(--cream); padding: 0.9rem 1.5rem;
    font-size: 0.85rem; letter-spacing: 0.05em; opacity: 0;

<script>
// ════════════════════════════════════════
// CONFIG — 請換成你的實際值
// ════════════════════════════════════════
const SUPABASE_URL = 'https://cbooopwgifrspvnbdxwj.supabase.co'
const SUPABASE_KEY = 'sb_publishable_laRsuGVqSQlal_qRpJ1-dg_GhoZc8HW'
const ADMIN_PASSWORD = 'kitoya2025'  // ← 請自行修改這組密碼
const DELIVERY_FEE = 200             // ← 黑貓宅配運費（元）
const BANK_INFO = {
  bank: '玉山銀行（808）',
  account: '1234-567-890123',       // ← 請換成你的帳號
  name: '木と家甜點工作室'
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let cart = []
let products = []
let currentProduct = null
let currentOptions = {}
let currentAddons = []
let currentQty = 1
let adminAuthed = false

// ════════════════════════════════════════
// ROUTING
// ════════════════════════════════════════
function checkAdminRoute() {
  if (window.location.hash === '#admin') {
    document.getElementById('storefront').style.display = 'none'
    document.getElementById('adminSection').style.display = 'block'
  }
}

function showPage(name) {
  document.querySelectorAll('#storefront .page').forEach(p => p.classList.remove('active'))
  document.getElementById('page-' + name).classList.add('active')
  if (name === 'cart') renderCart()
  window.scrollTo(0, 0)
}

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
let toastTimer
function toast(msg, type='') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'toast show' + (type ? ' '+type : '')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.className='toast', 3000)
}

// ════════════════════════════════════════
// LOAD PRODUCTS
// ════════════════════════════════════════
async function loadProducts() {
  const { data, error } = await sb.from('products').select('*').eq('is_active', true).order('created_at')
  document.getElementById('productsLoading').style.display = 'none'
  document.getElementById('productsGrid').style.display = 'grid'
  if (error || !data.length) {
    document.getElementById('productsGrid').innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1">目前尚無上架商品。</p>'
    return
  }
  products = data
  document.getElementById('productsGrid').innerHTML = data.map(p => `
    <div class="product-card" onclick="openProduct('${p.id}')">
      <div class="product-img-wrap">
        ${p.image_url
          ? `<img src="${p.image_url}" alt="${p.name}" loading="lazy">`
          : `<div class="product-img-placeholder">🍰</div>`}
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.description || ''}</div>
        <div class="product-price">NT$ <em>${p.base_price}</em> 起</div>
      </div>
    </div>
  `).join('')
}

// ════════════════════════════════════════
// PRODUCT MODAL
// ════════════════════════════════════════
function openProduct(id) {
  const p = products.find(x => x.id === id)
  if (!p) return
  currentProduct = p
  currentOptions = {}
  currentAddons = []
  currentQty = 1

  const opts = p.options || {}
  let optHtml = ''

  if (opts.sizes?.length) {
    optHtml += `<div class="option-group">
      <span class="option-label">SIZE 尺寸</span>
      <div class="option-chips" id="opt-size">${opts.sizes.map((s,i) =>
        `<button class="option-chip ${i===0?'selected':''}" onclick="selectOption('size','${s.name}',${s.price||0},this)">
          ${s.name}${s.price?`<span class="chip-price">+${s.price}</span>`:''}
        </button>`
      ).join('')}</div></div>`
    if (opts.sizes[0]) currentOptions.size = {name: opts.sizes[0].name, price: opts.sizes[0].price||0}
  }

  if (opts.flavors?.length) {
    optHtml += `<div class="option-group">
      <span class="option-label">FLAVOR 口味</span>
      <div class="option-chips" id="opt-flavor">${opts.flavors.map((f,i) =>
        `<button class="option-chip ${i===0?'selected':''}" onclick="selectOption('flavor','${f.name}',${f.price||0},this)">
          ${f.name}${f.price?`<span class="chip-price">+${f.price}</span>`:''}
        </button>`
      ).join('')}</div></div>`
    if (opts.flavors[0]) currentOptions.flavor = {name: opts.flavors[0].name, price: opts.flavors[0].price||0}
  }

  if (opts.styles?.length) {
    optHtml += `<div class="option-group">
      <span class="option-label">STYLE 樣式</span>
      <div class="option-chips" id="opt-style">${opts.styles.map((s,i) =>
        `<button class="option-chip ${i===0?'selected':''}" onclick="selectOption('style','${s.name}',${s.price||0},this)">
          ${s.name}${s.price?`<span class="chip-price">+${s.price}</span>`:''}
        </button>`
      ).join('')}</div></div>`
    if (opts.styles[0]) currentOptions.style = {name: opts.styles[0].name, price: opts.styles[0].price||0}
  }

  let addonHtml = ''
  if (opts.addons?.length) {
    addonHtml = `<div class="option-group">
      <span class="option-label">ADD-ON 加購</span>
      ${opts.addons.map((a,i) => `
        <div class="addon-item" id="addon-${i}" onclick="toggleAddon(${i},'${a.name}',${a.price||0})">
          <div class="addon-check" id="addon-check-${i}"></div>
          <span class="addon-name">${a.name}</span>
          <span class="addon-price">+NT$ ${a.price||0}</span>
        </div>`
      ).join('')}
    </div>`
  }

  document.getElementById('modalContent').innerHTML = `
    ${p.image_url
      ? `<img class="modal-img" src="${p.image_url}" alt="${p.name}">`
      : `<div class="modal-img-placeholder">🍰</div>`}
    <div class="modal-header">
      <div>
        <div class="modal-title">${p.name}</div>
        <div class="modal-price">${p.description || ''}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${optHtml}
      ${addonHtml}
      <div class="option-group">
        <span class="option-label">QUANTITY 數量</span>
        <div class="qty-wrap">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-num" id="modalQty">1</span>
          <button class="qty-btn" onclick="changeQty(1)">＋</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-total">
        小計
        <strong id="modalTotal">NT$ ${p.base_price}</strong>
      </div>
      <button class="btn-primary" onclick="addToCart()">加入購物車</button>
    </div>
  `
  document.getElementById('productModal').classList.add('open')
  document.body.style.overflow = 'hidden'
  updateModalTotal()
}

function selectOption(type, name, price, el) {
  el.closest('.option-chips').querySelectorAll('.option-chip').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  currentOptions[type] = {name, price}
  updateModalTotal()
}

function toggleAddon(i, name, price) {
  const idx = currentAddons.findIndex(a => a.name === name)
  if (idx >= 0) {
    currentAddons.splice(idx, 1)
    document.getElementById('addon-'+i).classList.remove('selected')
    document.getElementById('addon-check-'+i).textContent = ''
  } else {
    currentAddons.push({name, price})
    document.getElementById('addon-'+i).classList.add('selected')
    document.getElementById('addon-check-'+i).textContent = '✓'
  }
  updateModalTotal()
}

function changeQty(d) {
  currentQty = Math.max(1, currentQty + d)
  document.getElementById('modalQty').textContent = currentQty
  updateModalTotal()
}

function calcUnitPrice() {
  let price = currentProduct.base_price
  Object.values(currentOptions).forEach(o => price += (o.price || 0))
  currentAddons.forEach(a => price += (a.price || 0))
  return price
}

function updateModalTotal() {
  const total = calcUnitPrice() * currentQty
  const el = document.getElementById('modalTotal')
  if (el) el.textContent = 'NT$ ' + total.toLocaleString()
}

function addToCart() {
  const unit = calcUnitPrice()
  cart.push({
    id: Date.now() + Math.random(),
    productId: currentProduct.id,
    productName: currentProduct.name,
    imageUrl: currentProduct.image_url,
    selectedOptions: {...currentOptions},
    addons: [...currentAddons],
    quantity: currentQty,
    unitPrice: unit,
    subtotal: unit * currentQty
  })
  updateCartCount()
  closeModal()
  toast('已加入購物車 🛒', 'success')
}

function closeModal() {
  document.getElementById('productModal').classList.remove('open')
  document.body.style.overflow = ''
}

function closeProductModal(e) {
  if (e.target === document.getElementById('productModal')) closeModal()
}

function updateCartCount() {
  const count = cart.reduce((s, i) => s + i.quantity, 0)
  document.getElementById('cartCountHeader').textContent = count
}

// ════════════════════════════════════════
// CART & CHECKOUT
// ════════════════════════════════════════
function renderCart() {
  const itemsEl = document.getElementById('cartItems')
  const summaryEl = document.getElementById('cartSummary')
  const formEl = document.getElementById('checkoutForm')

  if (!cart.length) {
    itemsEl.innerHTML = '<p style="color:var(--text-muted);padding:3rem 0;text-align:center">購物車是空的</p>'
    summaryEl.innerHTML = ''
    formEl.innerHTML = ''
    return
  }

  itemsEl.innerHTML = cart.map((item, idx) => {
    const opts = Object.entries(item.selectedOptions).map(([k,v]) => v.name).join('・')
    const addons = item.addons.map(a => a.name).join('・')
    return `
    <div class="cart-item">
      ${item.imageUrl
        ? `<img class="cart-item-img" src="${item.imageUrl}" alt="${item.productName}">`
        : `<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem">🍰</div>`}
      <div class="cart-item-info">
        <div class="cart-item-name">${item.productName}</div>
        <div class="cart-item-opts">${[opts, addons].filter(Boolean).join(' ｜ ')}</div>
        <div class="cart-item-opts">數量：${item.quantity}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem">
        <span class="cart-item-price">NT$ ${item.subtotal.toLocaleString()}</span>
        <button class="cart-item-remove" onclick="removeCartItem(${idx})">✕</button>
      </div>
    </div>`
  }).join('')

  const subtotal = cart.reduce((s, i) => s + i.subtotal, 0)

  summaryEl.innerHTML = `
    <div class="cart-summary">
      <div class="summary-row"><span>商品小計</span><span>NT$ ${subtotal.toLocaleString()}</span></div>
      <div class="summary-row" id="deliveryRow" style="display:none"><span>宅配運費</span><span>NT$ ${DELIVERY_FEE}</span></div>
      <div class="summary-row total"><span>訂單總計</span><span id="totalAmount">NT$ ${subtotal.toLocaleString()}</span></div>
    </div>`

  formEl.innerHTML = `
    <div class="checkout-form">

      <!-- 注意事項 -->
      <div class="bank-info" style="margin-bottom:1.5rem;border-left-color:var(--brown-pale)">
        <p style="font-size:0.82rem;line-height:1.8;color:var(--text-muted)">
          📌 本頁為 <strong style="color:var(--brown)">6月蛋糕訂購</strong>專用表單<br>
          📌 下單前請詳閱說明，填寫完畢後等候確認通知<br>
          📌 付款方式：<strong style="color:var(--brown)">匯款後憑轉帳截圖確認</strong>
        </p>
      </div>

      <!-- 聯絡資訊 -->
      <p class="form-section-title">聯絡資訊</p>
      <div class="form-group">
        <label class="form-label">姓名 *</label>
        <input class="form-input" id="fName" placeholder="請輸入真實姓名">
      </div>
      <div class="form-group">
        <label class="form-label">Instagram 帳號 *</label>
        <input class="form-input" id="fIg" placeholder="@yourname（方便聯繫確認）">
      </div>
      <div class="form-group">
        <label class="form-label">電話 *</label>
        <input class="form-input" id="fPhone" placeholder="09xxxxxxxx" type="tel">
      </div>

      <!-- 取貨日期 -->
      <p class="form-section-title" style="margin-top:1.5rem">取貨日期 *</p>
      <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.8rem">請選擇一個取貨日期</p>
      <div class="option-chips" id="pickupDateChips" style="flex-wrap:wrap;gap:0.5rem;display:flex">
        ${['6/12（四）','6/13（五）','6/14（六）','6/15（日）','6/21（六）','6/22（日）','6/28（六）','6/29（日）'].map((d,i)=>`
          <button class="option-chip" onclick="selectPickupDate('${d}',this)">${d}</button>
        `).join('')}
      </div>
      <input type="hidden" id="fPickupDate">

      <!-- 取貨時段 -->
      <p class="form-section-title" style="margin-top:1.5rem">取貨時段 *</p>
      <div class="radio-group">
        <label class="radio-option" id="time-a" onclick="selectTimeSlot('14:00 – 16:00')">
          <div class="radio-title">🕑 14:00 – 16:00</div>
        </label>
        <label class="radio-option" id="time-b" onclick="selectTimeSlot('15:00 – 17:00')">
          <div class="radio-title">🕒 15:00 – 17:00</div>
        </label>
      </div>
      <input type="hidden" id="fTimeSlot">

      <!-- 取貨方式 -->
      <p class="form-section-title" style="margin-top:1.5rem">取貨方式 *</p>
      <div class="radio-group">
        <label class="radio-option selected" id="opt-pickup" onclick="selectDelivery('pickup')">
          <input type="radio" name="delivery" value="pickup" checked>
          <div class="radio-title">🤝 面交自取</div>
          <div class="radio-desc">約定地點面交</div>
        </label>
        <label class="radio-option" id="opt-delivery" onclick="selectDelivery('delivery')">
          <input type="radio" name="delivery" value="delivery">
          <div class="radio-title">📦 黑貓低溫宅配</div>
          <div class="radio-desc">運費 NT$ ${DELIVERY_FEE}</div>

      <div class="option-chips" id="cakeSizeChips" style="flex-wrap:wrap;gap:0.5rem;display:flex">
        ${[
          {label:'4吋（2–4人）', price:680},
          {label:'6吋（4–6人）', price:1030},
          {label:'7吋（6–8人）', price:1380},
          {label:'8吋（8–12人）', price:1680}
        ].map(s=>`
          <button class="option-chip" onclick="selectCakeSize('${s.label}',${s.price},this)">
            ${s.label}<span class="chip-price">NT$${s.price}</span>
          </button>
        `).join('')}
      </div>
      <input type="hidden" id="fCakeSize">
      <input type="hidden" id="fCakeSizePrice" value="0">

      <!-- 口味 -->
      <p class="form-section-title" style="margin-top:1.5rem">蛋糕口味 *</p>

let selectedDelivery = 'pickup'
let selectedPayment = 'transfer'

function selectPickupDate(val, el) {
  document.querySelectorAll('#pickupDateChips .option-chip').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  document.getElementById('fPickupDate').value = val
}

function selectTimeSlot(val) {
  document.getElementById('time-a').classList.toggle('selected', val==='14:00 – 16:00')
  document.getElementById('time-b').classList.toggle('selected', val==='15:00 – 17:00')
  document.getElementById('fTimeSlot').value = val
}

function selectCakeSize(label, price, el) {
  document.querySelectorAll('#cakeSizeChips .option-chip').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  document.getElementById('fCakeSize').value = label
  document.getElementById('fCakeSizePrice').value = price
  document.getElementById('previewCakePrice').textContent = 'NT$ ' + price.toLocaleString()
  updateTotal()
}

function selectFlavor(val, el) {
  document.querySelectorAll('#flavorChips .option-chip').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  document.getElementById('fFlavor').value = val
}

function selectDeco1(val, el) {
  document.querySelectorAll('#deco1Chips .option-chip').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  document.getElementById('fDeco1').value = val
  document.getElementById('deco1CustomGroup').style.display = val === '不需要' ? 'none' : 'block'
}

function selectDeco2(val, el) {
  document.querySelectorAll('#deco2Chips .option-chip').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  document.getElementById('fDeco2').value = val
  // 解析配件費用
  const match = val.match(/NT\$(\d+)/)
  const decoPrice = match ? parseInt(match[1]) : 0
  document.getElementById('decoRow').style.display = decoPrice > 0 ? 'flex' : 'none'
  document.getElementById('previewDecoPrice').textContent = decoPrice > 0 ? 'NT$ ' + decoPrice : '—'
  updateTotal()
}

function selectBag(val, price, el) {
  document.querySelectorAll('.option-chip[id^="bag-"]').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  document.getElementById('fBag').value = val
  document.getElementById('fBagPrice').value = price
  document.getElementById('bagRow').style.display = price > 0 ? 'flex' : 'none'
  updateTotal()
}

function selectDelivery(v) {
  selectedDelivery = v
  document.getElementById('opt-pickup').classList.toggle('selected', v==='pickup')
  document.getElementById('opt-delivery').classList.toggle('selected', v==='delivery')
  document.getElementById('deliveryAddressGroup').style.display = v==='delivery' ? 'block' : 'none'
  document.getElementById('deliveryRow').style.display = v==='delivery' ? 'flex' : 'none'
  updateTotal()
}

function selectPayment(v) {
  selectedPayment = v
}

function updateTotal() {
  const cakePrice = parseInt(document.getElementById('fCakeSizePrice')?.value || 0)
  const bagPrice = parseInt(document.getElementById('fBagPrice')?.value || 0)
  const fee = selectedDelivery === 'delivery' ? DELIVERY_FEE : 0
  // 配件費用
  const deco2 = document.getElementById('fDeco2')?.value || ''
  const decoMatch = deco2.match(/NT\$(\d+)/)
  const decoPrice = decoMatch ? parseInt(decoMatch[1]) : 0
  const total = cakePrice + bagPrice + fee + decoPrice
  const el = document.getElementById('totalAmount')
  if (el) el.textContent = cakePrice > 0 ? 'NT$ ' + total.toLocaleString() : 'NT$ —'
}

function removeCartItem(idx) {
  cart.splice(idx, 1)
  updateCartCount()
  renderCart()
}

async function submitOrder() {
  const name = document.getElementById('fName')?.value.trim()
  const ig = document.getElementById('fIg')?.value.trim()
  const phone = document.getElementById('fPhone')?.value.trim()
  const pickupDate = document.getElementById('fPickupDate')?.value
  const timeSlot = document.getElementById('fTimeSlot')?.value
  const cakeSize = document.getElementById('fCakeSize')?.value
  const flavor = document.getElementById('fFlavor')?.value
  const deco1 = document.getElementById('fDeco1')?.value
  const deco2 = document.getElementById('fDeco2')?.value
  const bag = document.getElementById('fBag')?.value || '不需要'
  const last5 = document.getElementById('fLast5')?.value.trim()
  const note = document.getElementById('fNote')?.value.trim()
  const address = document.getElementById('fAddress')?.value.trim()

  if (!name) { toast('請填寫姓名', 'error'); return }
  if (!ig) { toast('請填寫 Instagram 帳號', 'error'); return }
  if (!phone) { toast('請填寫電話', 'error'); return }
  if (!pickupDate) { toast('請選擇取貨日期', 'error'); return }
  if (!timeSlot) { toast('請選擇取貨時段', 'error'); return }
  if (!cakeSize) { toast('請選擇蛋糕尺寸', 'error'); return }
  if (!flavor) { toast('請選擇蛋糕口味', 'error'); return }
  if (!deco1) { toast('請選擇配件一', 'error'); return }
  if (!deco2) { toast('請選擇配件二', 'error'); return }
  if (selectedDelivery === 'delivery' && !address) { toast('請填寫收件地址', 'error'); return }
  if (!last5) { toast('請填寫帳號末五碼', 'error'); return }

  const cakePrice = parseInt(document.getElementById('fCakeSizePrice')?.value || 0)
  const bagPrice = parseInt(document.getElementById('fBagPrice')?.value || 0)
  const fee = selectedDelivery === 'delivery' ? DELIVERY_FEE : 0
  const decoMatch = deco2.match(/NT\$(\d+)/)
  const decoPrice = decoMatch ? parseInt(decoMatch[1]) : 0
  const total = cakePrice + bagPrice + fee + decoPrice

  const noteAll = [
    `IG：${ig}`,
    `取貨日期：${pickupDate}`,
    `取貨時段：${timeSlot}`,
    `蛋糕尺寸：${cakeSize}`,
    `口味：${flavor}`,
    `配件一：${deco1}`,
    `配件二：${deco2 || '不需要'}`,
    `保冷袋：${bag}`,
    address ? `地址：${address}` : '',
    note ? `備註：${note}` : ''
  ].filter(Boolean).join('\n')

  const btn = document.querySelector('#checkoutForm .btn-primary')
  btn.disabled = true; btn.textContent = '送出中...'

  try {
    const { data: order, error: oErr } = await sb.from('orders').insert({
      customer_name: name,
      customer_phone: phone,
      delivery_method: selectedDelivery,
      delivery_fee: fee,
      total_amount: total,
      payment_method: 'transfer',
      transfer_last5: last5,
      note: noteAll
    }).select().single()

    if (oErr) throw oErr

    // 若購物車有商品也一併寫入（蛋糕訂購模式下通常為空）
    if (cart.length) {
      const items = cart.map(item => ({
        order_id: order.id,
        product_id: item.productId,
        product_name: item.productName,
        quantity: item.quantity,
        unit_price: item.unitPrice,
        selected_options: {options: item.selectedOptions, addons: item.addons},
        subtotal: item.subtotal
      }))
      await sb.from('order_items').insert(items)
    }

    cart = []
    updateCartCount()
    document.getElementById('successOrderId').textContent = '訂單編號：' + order.id.slice(0,8).toUpperCase()
    showPage('success')
  } catch(e) {
    toast('送出失敗，請稍後再試', 'error')
    btn.disabled = false; btn.textContent = '確認送出訂單'
  }
}

let allOrders = []

async function loadOrders() {
  const { data, error } = await sb.from('orders').select('*, order_items(*)').order('created_at', {ascending: false})
  if (error) { toast('載入訂單失敗', 'error'); return }
  allOrders = data || []
  const tbody = document.getElementById('ordersBody')
  if (!allOrders.length) {
    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:var(--text-muted);padding:3rem">尚無訂單</td></tr>'
    return
  }
  tbody.innerHTML = allOrders.map(o => `
    <tr>
      <td style="font-size:0.75rem;color:var(--text-muted)">${o.id.slice(0,8).toUpperCase()}</td>
      <td style="white-space:nowrap">${new Date(o.created_at).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
      <td>${o.customer_name}</td>
      <td>${o.customer_phone}</td>
      <td>${o.delivery_method === 'pickup' ? '面交' : '宅配'}</td>
      <td>${o.payment_method === 'transfer' ? '匯款' : '貨到付款'}</td>
      <td>${o.transfer_last5 || '—'}</td>
      <td>NT$ ${o.total_amount.toLocaleString()}</td>
      <td style="max-width:160px;font-size:0.78rem">${o.note || '—'}</td>
      <td><span class="badge ${o.status==='done'?'done':'pending'}">${o.status==='done'?'完成':'待確認'}</span></td>
      <td style="white-space:nowrap">
        ${o.status !== 'done'
          ? `<button class="btn-sm green" onclick="markDone('${o.id}')">標記完成</button>`
          : `<span style="font-size:0.75rem;color:var(--text-muted)">已完成</span>`}
      </td>
    </tr>
  `).join('')
}

async function markDone(id) {
  await sb.from('orders').update({status:'done'}).eq('id', id)
  toast('已標記完成', 'success')
  loadOrders()
}

function exportOrders() {
  if (!allOrders.length) { toast('沒有訂單可匯出'); return }
  const rows = allOrders.map(o => ({
    訂單編號: o.id.slice(0,8).toUpperCase(),
    時間: new Date(o.created_at).toLocaleString('zh-TW'),
    姓名: o.customer_name,
    電話: o.customer_phone,
    取貨方式: o.delivery_method === 'pickup' ? '面交' : '黑貓宅配',
    付款方式: o.payment_method === 'transfer' ? '銀行匯款' : '貨到付款',
    帳號末五碼: o.transfer_last5 || '',
    運費: o.delivery_fee,
    總金額: o.total_amount,
    備註: o.note || '',
    狀態: o.status === 'done' ? '已完成' : '待確認'
  }))
  const ws = XLSX.utils.json_to_sheet(rows)
  const wb = XLSX.utils.book_new()
  XLSX.utils.book_append_sheet(wb, ws, '訂單')
  XLSX.writeFile(wb, `kitoya_orders_${new Date().toISOString().slice(0,10)}.xlsx`)
  toast('匯出成功 ✓', 'success')
}

let editingProduct = null
let editOptions = { sizes: [], flavors: [], styles: [], addons: [] }
let newImageFile = null
let newImagePreview = null

function openProductEdit(id) {
  editingProduct = id ? adminProducts.find(p => p.id === id) : null
  newImageFile = null
  newImagePreview = null

  if (editingProduct) {
    const o = editingProduct.options || {}
    editOptions = {
      sizes: (o.sizes || []).map(x => ({...x})),
      flavors: (o.flavors || []).map(x => ({...x})),
      styles: (o.styles || []).map(x => ({...x})),
      addons: (o.addons || []).map(x => ({...x}))
    }
  } else {
    editOptions = { sizes: [], flavors: [], styles: [], addons: [] }
  }

  renderEditModal()
  document.getElementById('editModalOverlay').classList.add('open')
  document.body.style.overflow = 'hidden'
}

function renderEditModal() {
  const p = editingProduct
  document.getElementById('editModalContent').innerHTML = `
    <div class="edit-modal-header">
      <h3>${p ? '編輯商品' : '新增商品'}</h3>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="edit-modal-body">
      <!-- Image -->
      <div class="form-group">
        <label class="form-label">商品照片（自動壓縮至 WebP）</label>
        <div class="img-upload-area" id="uploadArea" onclick="document.getElementById('imgFileInput').click()">
          ${newImagePreview || (p?.image_url)
            ? `<img class="img-preview" id="imgPreview" src="${newImagePreview || p?.image_url}">`
            : `<p>點擊上傳照片<br><span style="font-size:0.75rem;opacity:0.6">支援 JPG / PNG / HEIC</span></p>`}
          <input type="file" id="imgFileInput" accept="image/*" onchange="handleImageUpload(event)" style="display:none">
        </div>
      </div>
      <!-- Basic info -->
      <div class="form-group">
        <label class="form-label">商品名稱 *</label>
        <input class="form-input" id="editName" value="${p?.name || ''}" placeholder="例：抹茶生乳捲">
      </div>
      <div class="form-group">
        <label class="form-label">商品描述</label>
        <input class="form-input" id="editDesc" value="${p?.description || ''}" placeholder="簡短描述">
      </div>
      <div class="form-group">
        <label class="form-label">基本價格（元）*</label>
        <input class="form-input" id="editPrice" type="number" value="${p?.base_price || ''}" placeholder="例：380">
      </div>
      <!-- Options -->
      ${['sizes','flavors','styles','addons'].map(type => `
        <div class="form-group">
          <div class="options-editor">
            <div class="options-editor-header">
              <span>${{sizes:'尺寸',flavors:'口味',styles:'樣式',addons:'加購選項'}[type]}</span>
              <button class="btn-sm outline" onclick="addOptionRow('${type}')">＋ 新增</button>
            </div>
            <div id="opts-${type}">${renderOptionRows(type)}</div>
          </div>
        </div>`
      ).join('')}
    </div>
    <div class="edit-modal-footer">
      <button class="btn-outline" onclick="closeEditModal()">取消</button>
      <button class="btn-primary" onclick="saveProduct()">儲存商品</button>
    </div>
  `
}

function renderOptionRows(type) {
  return editOptions[type].map((o,i) => `
    <div class="option-row" id="optrow-${type}-${i}">
      <input placeholder="名稱" value="${o.name||''}" oninput="editOptions['${type}'][${i}].name=this.value">
      <input placeholder="加價（0=免費）" type="number" value="${o.price||0}" style="max-width:130px" oninput="editOptions['${type}'][${i}].price=Number(this.value)">
      <button class="option-row-del" onclick="removeOptionRow('${type}',${i})">✕</button>
    </div>
  `).join('')
}

function addOptionRow(type) {
  editOptions[type].push({name:'', price:0})
  document.getElementById('opts-'+type).innerHTML = renderOptionRows(type)
}

function removeOptionRow(type, i) {
  editOptions[type].splice(i, 1)
  document.getElementById('opts-'+type).innerHTML = renderOptionRows(type)
}

// Image compression → WebP
async function handleImageUpload(e) {
  const file = e.target.files[0]
  if (!file) return
  toast('壓縮圖片中...')
  try {
    const compressed = await compressToWebP(file, 800, 0.82)
    newImageFile = compressed
    newImagePreview = URL.createObjectURL(compressed)
    const uploadArea = document.getElementById('uploadArea')
    uploadArea.innerHTML = `<img class="img-preview" id="imgPreview" src="${newImagePreview}"><input type="file" id="imgFileInput" accept="image/*" onchange="handleImageUpload(event)" style="display:none">`
    toast('圖片已壓縮 ✓', 'success')
  } catch(err) {
    toast('圖片處理失敗', 'error')
  }
}

function compressToWebP(file, maxSize, quality) {
  return new Promise((res, rej) => {
    const img = new Image()
    const url = URL.createObjectURL(file)
    img.onload = () => {
      URL.revokeObjectURL(url)
      let w = img.width, h = img.height
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize }
        else { w = Math.round(w * maxSize / h); h = maxSize }
      }
      const canvas = document.createElement('canvas')
      canvas.width = w; canvas.height = h
      canvas.getContext('2d').drawImage(img, 0, 0, w, h)
      canvas.toBlob(blob => blob ? res(blob) : rej(), 'image/webp', quality)
    }
    img.onerror = rej
    img.src = url
  })
}

async function saveProduct() {
  const name = document.getElementById('editName').value.trim()
  const desc = document.getElementById('editDesc').value.trim()
  const price = parseInt(document.getElementById('editPrice').value)
  if (!name || !price) { toast('請填寫商品名稱與價格', 'error'); return }

  const btn = document.querySelector('.edit-modal-footer .btn-primary')
  btn.disabled = true; btn.textContent = '儲存中...'

  let imageUrl = editingProduct?.image_url || null

  if (newImageFile) {
    const ext = 'webp'
    const path = `${Date.now()}.${ext}`
    const { error: upErr } = await sb.storage.from('product-images').upload(path, newImageFile, {contentType:'image/webp', upsert:true})
    if (upErr) { toast('圖片上傳失敗', 'error'); btn.disabled=false; btn.textContent='儲存商品'; return }
    const { data: urlData } = sb.storage.from('product-images').getPublicUrl(path)
    imageUrl = urlData.publicUrl
  }

  const payload = {
    name, description: desc, base_price: price,
    image_url: imageUrl,
    options: editOptions
  }

  let error
  if (editingProduct) {
    ({ error } = await sb.from('products').update(payload).eq('id', editingProduct.id))
  } else {
    ({ error } = await sb.from('products').insert(payload))
  }

  if (error) { toast('儲存失敗：' + error.message, 'error'); btn.disabled=false; btn.textContent='儲存商品'; return }

  toast('商品已儲存 ✓', 'success')
  closeEditModal()
  loadAdminProducts()
}

function closeEditModal(e) {
  if (e && e.target !== document.getElementById('editModalOverlay')) return
  document.getElementById('editModalOverlay').classList.remove('open')
  document.body.style.overflow = ''
}

checkAdminRoute()
if (!window.location.hash.includes('admin')) {
  loadProducts()
